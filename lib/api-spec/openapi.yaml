openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Autenticazione admin
  - name: excursions
    description: Gite di gruppo
  - name: offers
    description: Offerte e pacchetti viaggio
  - name: leads
    description: Richieste clienti (Mini-CRM)
  - name: public
    description: Endpoint pubblici (senza autenticazione)
  - name: dashboard
    description: Dashboard amministrativa
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Login admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login riuscito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Credenziali non valide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Logout admin
      responses:
        "200":
          description: Logout riuscito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Utente corrente
      responses:
        "200":
          description: Dati utente autenticato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Non autenticato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Statistiche dashboard admin
      responses:
        "200":
          description: Statistiche aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /admin/excursions:
    get:
      operationId: listExcursions
      tags: [excursions]
      summary: Lista gite
      responses:
        "200":
          description: Lista gite con dati finanziari
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExcursionSummary"
    post:
      operationId: createExcursion
      tags: [excursions]
      summary: Crea nuova gita
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExcursionInput"
      responses:
        "201":
          description: Gita creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExcursionSummary"
  /admin/excursions/{id}:
    get:
      operationId: getExcursion
      tags: [excursions]
      summary: Dettaglio gita con prenotazioni
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dettaglio gita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExcursionDetail"
        "404":
          description: Gita non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateExcursion
      tags: [excursions]
      summary: Aggiorna gita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExcursionInput"
      responses:
        "200":
          description: Gita aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExcursionSummary"
  /admin/excursions/{id}/bookings:
    post:
      operationId: addExcursionBooking
      tags: [excursions]
      summary: Aggiungi prenotazione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Prenotazione aggiunta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /admin/excursions/{id}/vehicle:
    patch:
      operationId: updateExcursionVehicle
      tags: [excursions]
      summary: Cambia veicolo gita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdateInput"
      responses:
        "200":
          description: Veicolo aggiornato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExcursionSummary"
  /admin/vehicles:
    get:
      operationId: listVehicles
      tags: [excursions]
      summary: Lista veicoli disponibili
      responses:
        "200":
          description: Lista veicoli
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
  /admin/offers:
    get:
      operationId: listOffers
      tags: [offers]
      summary: Lista offerte
      responses:
        "200":
          description: Lista offerte
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OfferSummary"
    post:
      operationId: createOffer
      tags: [offers]
      summary: Crea nuova offerta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferInput"
      responses:
        "201":
          description: Offerta creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferSummary"
  /admin/offers/{id}:
    get:
      operationId: getOffer
      tags: [offers]
      summary: Dettaglio offerta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dettaglio offerta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDetail"
        "404":
          description: Offerta non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOffer
      tags: [offers]
      summary: Aggiorna offerta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferInput"
      responses:
        "200":
          description: Offerta aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferSummary"
        "404":
          description: Offerta non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteOffer
      tags: [offers]
      summary: Elimina offerta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Offerta eliminata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Offerta non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/offers/{id}/duplicate:
    post:
      operationId: duplicateOffer
      tags: [offers]
      summary: Duplica offerta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Offerta duplicata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferSummary"
        "404":
          description: Offerta non trovata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: Lista leads (inbox)
      responses:
        "200":
          description: Lista leads con dati prodotto collegato
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
  /admin/leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Aggiorna stato lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadStatusUpdate"
      responses:
        "200":
          description: Stato aggiornato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Stato non valido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead non trovato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/leads/{id}/notes:
    get:
      operationId: listLeadNotes
      tags: [leads]
      summary: Note interne del lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista note
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadNote"
    post:
      operationId: addLeadNote
      tags: [leads]
      summary: Aggiungi nota al lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadNoteInput"
      responses:
        "201":
          description: Nota aggiunta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadNote"
        "404":
          description: Lead non trovato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /leads:
    post:
      operationId: submitContactRequest
      tags: [public]
      summary: Invia richiesta di contatto pubblica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicLeadInput"
      responses:
        "201":
          description: Richiesta ricevuta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLeadResponse"
        "400":
          description: Validazione fallita
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /catalog/products:
    get:
      operationId: listPublicCatalog
      tags: [public]
      summary: Lista offerte pubblicate e gite attive (per dropdown contatti)
      responses:
        "200":
          description: Catalogo prodotti pubblici
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCatalog"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
      required:
        - id
        - email
        - name
        - role
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ExcursionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        date:
          type: string
        status:
          type: string
        currentCapacity:
          type: integer
        minThreshold:
          type: integer
        adherentsCount:
          type: integer
        depositsCount:
          type: integer
        balancesCount:
          type: integer
        vehicleFixedCost:
          type: string
        mealCostPerPerson:
          type: string
        entranceCostPerPerson:
          type: string
        extraCostPerPerson:
          type: string
        pricePerPerson:
          type: string
        vehicleId:
          type: string
          nullable: true
        switchThreshold:
          type: integer
          nullable: true
        switchVehicleId:
          type: string
          nullable: true
        switchVehicleAdditionalCost:
          type: string
          nullable: true
        operationalNotes:
          type: string
          nullable: true
        ricaviStimati:
          type: number
        costiVariabili:
          type: number
        costiTotali:
          type: number
        margineNetto:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - location
        - date
        - status
        - currentCapacity
        - minThreshold
        - adherentsCount
        - depositsCount
        - balancesCount
        - pricePerPerson
        - ricaviStimati
        - costiVariabili
        - costiTotali
        - margineNetto
        - createdAt
        - updatedAt
    ExcursionDetail:
      allOf:
        - $ref: "#/components/schemas/ExcursionSummary"
        - type: object
          properties:
            bookings:
              type: array
              items:
                $ref: "#/components/schemas/Booking"
          required:
            - bookings
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        excursionId:
          type: string
          format: uuid
        customerId:
          type: string
          nullable: true
        customerName:
          type: string
        seats:
          type: integer
        paymentStatus:
          type: string
        bookedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - excursionId
        - customerName
        - seats
        - paymentStatus
        - bookedAt
        - createdAt
        - updatedAt
    BookingInput:
      type: object
      properties:
        customerName:
          type: string
        customerId:
          type: string
        seats:
          type: integer
        paymentStatus:
          type: string
      required:
        - customerName
    ExcursionInput:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        date:
          type: string
        status:
          type: string
        vehicleId:
          type: string
          nullable: true
        currentCapacity:
          type: integer
        minThreshold:
          type: integer
        vehicleFixedCost:
          type: string
        mealCostPerPerson:
          type: string
        entranceCostPerPerson:
          type: string
        extraCostPerPerson:
          type: string
        pricePerPerson:
          type: string
        switchThreshold:
          type: integer
          nullable: true
        switchVehicleId:
          type: string
          nullable: true
        switchVehicleAdditionalCost:
          type: string
          nullable: true
        operationalNotes:
          type: string
          nullable: true
    VehicleUpdateInput:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        vehicleFixedCost:
          type: string
      required:
        - vehicleId
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        capacity:
          type: integer
        fixedCost:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - capacity
        - fixedCost
        - createdAt
        - updatedAt
    OfferSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        destination:
          type: string
        tourOperator:
          type: string
          nullable: true
        status:
          type: string
        validFrom:
          type: string
          format: date-time
          nullable: true
        validTo:
          type: string
          format: date-time
          nullable: true
        durationDays:
          type: integer
          nullable: true
        durationNights:
          type: integer
          nullable: true
        period:
          type: string
          nullable: true
        publicPrice:
          type: string
          nullable: true
        leadsCount:
          type: integer
        lastInterestAt:
          type: string
          format: date-time
          nullable: true
        mainSource:
          type: string
          nullable: true
        publicLink:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - destination
        - status
        - leadsCount
        - createdAt
        - updatedAt
    OfferDetail:
      allOf:
        - $ref: "#/components/schemas/OfferSummary"
        - type: object
          properties:
            baseFormula:
              type: string
              nullable: true
            departureCity:
              type: string
              nullable: true
            advertisingText:
              type: string
              nullable: true
            servicesIncluded:
              type: string
              nullable: true
            servicesExcluded:
              type: string
              nullable: true
            highlights:
              type: string
              nullable: true
            pricingNotes:
              type: string
              nullable: true
            internalNotes:
              type: string
              nullable: true
    OfferInput:
      type: object
      properties:
        name:
          type: string
        destination:
          type: string
        tourOperator:
          type: string
          nullable: true
        status:
          type: string
        validFrom:
          type: string
          format: date-time
          nullable: true
        validTo:
          type: string
          format: date-time
          nullable: true
        baseFormula:
          type: string
          nullable: true
        departureCity:
          type: string
          nullable: true
        durationDays:
          type: integer
          nullable: true
        durationNights:
          type: integer
          nullable: true
        period:
          type: string
          nullable: true
        publicPrice:
          type: string
          nullable: true
        advertisingText:
          type: string
          nullable: true
        servicesIncluded:
          type: string
          nullable: true
        servicesExcluded:
          type: string
          nullable: true
        highlights:
          type: string
          nullable: true
        pricingNotes:
          type: string
          nullable: true
        internalNotes:
          type: string
          nullable: true
        publicLink:
          type: string
          nullable: true
        mainSource:
          type: string
          nullable: true

    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        customerId:
          type: string
          format: uuid
          nullable: true
        offerId:
          type: string
          format: uuid
          nullable: true
        excursionId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          description: "generic | offer | excursion"
        status:
          type: string
          description: "new | contacted | quote_sent | won | lost"
        channel:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
        lastContactAt:
          type: string
          format: date-time
          nullable: true
        receivedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        offerName:
          type: string
          nullable: true
        excursionName:
          type: string
          nullable: true
      required:
        - id
        - customerName
        - email
        - type
        - status
        - receivedAt
        - createdAt
        - updatedAt
    LeadNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        leadId:
          type: string
          format: uuid
        text:
          type: string
        authorName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - leadId
        - text
        - authorName
        - createdAt
        - updatedAt
    LeadStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, quote_sent, won, lost]
      required:
        - status
    DashboardLeadsByStatus:
      type: object
      properties:
        new:
          type: integer
        contacted:
          type: integer
        quote_sent:
          type: integer
        won:
          type: integer
        lost:
          type: integer
      required:
        - new
        - contacted
        - quote_sent
        - won
        - lost
    DashboardUpcomingExcursion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        date:
          type: string
        status:
          type: string
        currentCapacity:
          type: integer
        minThreshold:
          type: integer
        adherentsCount:
          type: integer
      required:
        - id
        - name
        - location
        - date
        - status
        - currentCapacity
        - minThreshold
        - adherentsCount
    DashboardRecentLead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerName:
          type: string
        email:
          type: string
        type:
          type: string
        status:
          type: string
        receivedAt:
          type: string
          format: date-time
        offerId:
          type: string
          format: uuid
          nullable: true
        excursionId:
          type: string
          format: uuid
          nullable: true
        offerName:
          type: string
          nullable: true
        excursionName:
          type: string
          nullable: true
      required:
        - id
        - customerName
        - email
        - type
        - status
        - receivedAt
    DashboardStats:
      type: object
      properties:
        leadsTotal:
          type: integer
        leadsByStatus:
          $ref: "#/components/schemas/DashboardLeadsByStatus"
        offersPublished:
          type: integer
        upcomingExcursionsCount:
          type: integer
        upcomingExcursions:
          type: array
          items:
            $ref: "#/components/schemas/DashboardUpcomingExcursion"
        recentLeads:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentLead"
      required:
        - leadsTotal
        - leadsByStatus
        - offersPublished
        - upcomingExcursionsCount
        - upcomingExcursions
        - recentLeads
    LeadNoteInput:
      type: object
      properties:
        text:
          type: string
        authorName:
          type: string
      required:
        - text
    PublicLeadInput:
      type: object
      properties:
        customerName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        productRef:
          type: string
          nullable: true
          description: "Riferimento prodotto nel formato 'offer:<uuid>' o 'excursion:<uuid>'"
        offerId:
          type: string
          format: uuid
          nullable: true
        excursionId:
          type: string
          format: uuid
          nullable: true
      required:
        - customerName
        - email
    PublicCatalog:
      type: object
      properties:
        offers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              destination:
                type: string
                nullable: true
            required: [id, name]
        excursions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              location:
                type: string
                nullable: true
              date:
                type: string
                nullable: true
            required: [id, name]
      required: [offers, excursions]
    PublicLeadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string
      required:
        - id
        - message
